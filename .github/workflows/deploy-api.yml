name: Deploy API

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy API to Railway
    runs-on: ubuntu-latest

    steps:
      - name: Check authorized user
        run: |
          # Add more users to the DEPLOY_ALLOWED_USERS repository variable (comma-separated, e.g. "KehlseyHoman,teammate")
          ALLOWED="${{ vars.DEPLOY_ALLOWED_USERS || github.repository_owner }}"
          if ! echo "$ALLOWED" | tr ',' '\n' | tr -d '[:space:]' | grep -qFx "${{ github.actor }}"; then
            echo "::error::${{ github.actor }} is not authorized to trigger this workflow."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service "${{ vars.RAILWAY_API_SERVICE || 'offerwatch-api' }}" --environment production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_API }}
