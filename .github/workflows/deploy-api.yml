name: Deploy API

on:
  workflow_dispatch:

# Required for OIDC: GitHub mints a short-lived token that AWS trusts to assume the IAM role.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy API to AWS App Runner
    runs-on: ubuntu-latest

    steps:
      - name: Check authorized user
        run: |
          # Add more users to the DEPLOY_ALLOWED_USERS repository variable (comma-separated, e.g. "KehlseyHoman,teammate")
          ALLOWED="${{ vars.DEPLOY_ALLOWED_USERS || github.repository_owner }}"
          if ! echo "$ALLOWED" | tr ',' '\n' | tr -d '[:space:]' | grep -qFx "${{ github.actor }}"; then
            echo "::error::${{ github.actor }} is not authorized to trigger this workflow."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: offerwatch-api
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$REPOSITORY:latest" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"

      - name: Trigger App Runner deployment
        run: |
          DEPLOY_ID=$(aws apprunner start-deployment \
            --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" \
            --query 'OperationId' --output text)
          echo "Started App Runner deployment: $DEPLOY_ID"

      - name: Wait for deployment to finish
        run: |
          echo "Polling App Runner service status..."
          for i in $(seq 1 40); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" \
              --query 'Service.Status' --output text)
            echo "Status: $STATUS"
            case "$STATUS" in
              RUNNING) echo "Deployment succeeded."; exit 0 ;;
              CREATE_FAILED|DELETE_FAILED|PAUSED) echo "::error::App Runner status: $STATUS"; exit 1 ;;
            esac
            sleep 15
          done
          echo "::error::Timed out waiting for App Runner to reach RUNNING."
          exit 1
