name: Deploy Frontend

on:
  workflow_dispatch:

# Required for OIDC: GitHub mints a short-lived token that AWS trusts to assume the IAM role.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Frontend to S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Check authorized user
        run: |
          # Add more users to the DEPLOY_ALLOWED_USERS repository variable (comma-separated, e.g. "KehlseyHoman,teammate")
          ALLOWED="${{ vars.DEPLOY_ALLOWED_USERS || github.repository_owner }}"
          if ! echo "$ALLOWED" | tr ',' '\n' | tr -d '[:space:]' | grep -qFx "${{ github.actor }}"; then
            echo "::error::${{ github.actor }} is not authorized to trigger this workflow."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: offerwatch-frontend/package-lock.json

      - name: Install dependencies
        working-directory: offerwatch-frontend
        run: npm ci

      - name: Build (production)
        working-directory: offerwatch-frontend
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync static assets to S3
        working-directory: offerwatch-frontend
        run: |
          # Hashed, immutable assets get a long cache; index.html must never be cached.
          aws s3 sync browser/ "s3://${{ vars.S3_BUCKET }}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp browser/index.html "s3://${{ vars.S3_BUCKET }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
