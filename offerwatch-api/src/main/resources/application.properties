spring.application.name=offerwatch-api

# ─── PostgreSQL / Supabase ───────────────────────────────────────────────────
# Values are read from environment variables — never hardcoded here.
# For local dev, copy .env.example → .env and fill it in (it's gitignored).
# In production (AWS App Runner): set these as service environment variables / secrets.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
# none = don't touch the schema; tables are managed via Supabase migrations
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── JWT ─────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ─── Cookie ───────────────────────────────────────────────────────────────────
# Set COOKIE_SECURE=true in production (HTTPS). False for local HTTP dev.
app.cookie.secure=${COOKIE_SECURE:false}

# ─── CORS ────────────────────────────────────────────────────────────────────
# In production the SPA and API share one origin (CloudFront proxies /api/* to App
# Runner), so CORS is not exercised. Set CORS_ALLOWED_ORIGINS to your CloudFront
# domain only if you call the App Runner URL directly from another origin.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
